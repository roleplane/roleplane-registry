name: Add issue to project

on:
  issues:
    types: [opened, reopened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/roleplane/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
          status: Backlog
