name: validate-entry

on:
  pull_request:
    paths:
      - "entries/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/validate-entry.ts
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: origin/${{ github.base_ref }}
          # FIRST_PARTY_READ_TOKEN is a PAT / GitHub App token with read access
          # to private first-party repos (e.g. roleplane/roleplane); falls back
          # to the repo-scoped token for public entries when it isn't set.
          GITHUB_TOKEN: ${{ secrets.FIRST_PARTY_READ_TOKEN || secrets.GITHUB_TOKEN }}
