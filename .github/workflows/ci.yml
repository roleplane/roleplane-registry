name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The re-pin tests compare each entry's history against its state on
          # main, so the base ref has to be present — not just the tip commit.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # Publish PRs add an entry without rebuilding index.json; the
      # rebuild-index workflow refreshes it on main after merge.
      - run: npm test
        env:
          SKIP_INDEX_DRIFT: ${{ github.event_name == 'pull_request' && '1' || '' }}
